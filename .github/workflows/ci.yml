name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Check cron consistency (scan.yml vs WINDOWS)
        working-directory: backend
        # Fails fast if the YAML cron entries drift from the WINDOWS list
        # baked into the "Write scan_status.json" step.
        run: python scripts/check_cron_consistency.py
      - name: Run pytest
        working-directory: backend
        run: pytest -q
      - name: Smoke scan (5 stocks, no holdings, no corp actions)
        working-directory: backend
        run: |
          python scanner.py --sample 5 --sleep 0 --skip-holdings --skip-corporate-actions --output /tmp/scan.json
          python -c "import json; d=json.load(open('/tmp/scan.json')); assert d['universe_size']==5; assert 'config' in d; print('smoke ok')"

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Build
        working-directory: frontend
        run: npm run build
