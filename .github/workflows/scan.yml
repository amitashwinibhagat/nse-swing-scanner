name: NSE Swing Scan

on:
  schedule:
    # Cron is UTC. IST = UTC+5:30.
    # 09:00 IST pre-market -> 03:30 UTC
    # 16:00 IST post-market -> 10:30 UTC
    - cron: "30 3 * * 1-5"
    - cron: "30 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit the scan output back to the repo

concurrency:
  group: nse-swing-scan
  cancel-in-progress: false   # queue duplicate triggers; do NOT cancel a running scan

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # Nifty 500 with 12 workers: cold-cache ~5-7 min, warm-cache ~30-90 s. 30 min leaves comfortable headroom for retry cascades.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache backend cache
        uses: actions/cache@v6
        with:
          path: backend/cache
          key: nse-swing-cache-${{ github.run_id }}
          restore-keys: |
            nse-swing-cache-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run full scan
        working-directory: backend
        run: python scanner.py --top-n 500 --workers 12 --sleep 0.2 --lenient-external-gates --output ../frontend/public/data/latest_scan.json
        # Nifty 500 (top 500 by free-float market cap) with 12 parallel workers.
        # Tuned conservatively to stay under Screener.in / yfinance rate-limit
        # ceilings on a shared GitHub Actions egress IP. The yfinance result
        # cache (12 h for price-derived, 24 h for fundamentals) is the main
        # speedup that keeps the scan within ~5 min cold-cache:
        #   - Cold cache (first run of the day, weekend-cleared): ~5-7 min.
        #   - Warm cache (subsequent runs): ~30-90 s (cache hits).
        # --lenient-external-gates: lets delivery/holdings pass when their
        # source is source_failed (NSE bhavcopy is behind Akamai bot
        # protection, Screener sometimes rate-limits the runner IP). The
        # source status is still surfaced in the JSON and UI badge.
# If NSE/yfinance/Screener rate-limits mid-run, this step fails and
    # the workflow stops WITHOUT committing a partial/corrupt file —
    # the frontend keeps serving the last good scan until the next run.

      - name: Ping healthchecks.io (scan started)
        if: ${{ github.event_name == 'schedule' }}
        # Proves the GitHub cron fired. healthchecks.io resets its "last
        # ping" timer on any successful ping — including /start — so a
        # /start ping is informational and an additional success ping
        # later just keeps the check green.
        #
        # Two secrets, one per scheduled slot, so healthchecks.io can
        # alert independently on a missed morning vs missed evening.
        # github.event.schedule carries the cron expression that fired
        # (e.g. "30 3 * * 1-5"), so we branch on it to pick the URL.
        env:
          MORNING_URL: ${{ secrets.HEALTHCHECK_PING_URL_MORNING }}
          EVENING_URL: ${{ secrets.HEALTHCHECK_PING_URL_EVENING }}
        continue-on-error: true
        run: |
          set +e
          case "${{ github.event.schedule }}" in
            "30 3 * * 1-5")
              url="$MORNING_URL"
              label="morning"
              ;;
            "30 10 * * 1-5")
              url="$EVENING_URL"
              label="evening"
              ;;
            *)
              echo "::notice::unrecognized cron '${{ github.event.schedule }}'; skipping healthchecks.io ping."
              exit 0
              ;;
          esac
          if [ -z "$url" ]; then
            echo "::notice::HEALTHCHECK_PING_URL_${label^^} secret not set; skipping healthchecks.io ping."
            exit 0
          fi
          curl -fsS -m 10 --retry 3 "${url}/start" \
            || echo "::warning::healthchecks.io start ping failed (will rely on success/fail ping)"

      - name: Ping healthchecks.io (scan failed)
        # If any prior step failed, ping /fail so healthchecks.io marks
        # this slot as red (email/Slack alert).
        if: failure() && github.event_name == 'schedule'
        env:
          MORNING_URL: ${{ secrets.HEALTHCHECK_PING_URL_MORNING }}
          EVENING_URL: ${{ secrets.HEALTHCHECK_PING_URL_EVENING }}
        continue-on-error: true
        run: |
          case "${{ github.event.schedule }}" in
            "30 3 * * 1-5")  url="$MORNING_URL";;
            "30 10 * * 1-5") url="$EVENING_URL";;
            *) exit 0;;
          esac
          if [ -n "$url" ]; then
            curl -fsS -m 10 --retry 3 "${url}/fail" \
              || echo "::warning::healthchecks.io fail ping failed"
          fi

      - name: Ping healthchecks.io (scan succeeded)
        if: success() && github.event_name == 'schedule'
        # Resets the period so the next scheduled slot starts fresh.
        env:
          MORNING_URL: ${{ secrets.HEALTHCHECK_PING_URL_MORNING }}
          EVENING_URL: ${{ secrets.HEALTHCHECK_PING_URL_EVENING }}
        continue-on-error: true
        run: |
          case "${{ github.event.schedule }}" in
            "30 3 * * 1-5")  url="$MORNING_URL";;
            "30 10 * * 1-5") url="$EVENING_URL";;
            *) exit 0;;
          esac
          if [ -n "$url" ]; then
            curl -fsS -m 10 --retry 3 "${url}" \
              || echo "::warning::healthchecks.io success ping failed"
          fi

      - name: Validate JSON contract
        working-directory: backend
        run: python -c "import json; p=json.load(open('../frontend/public/data/latest_scan.json')); assert 'generated_at' in p and 'stocks' in p and p['stocks'], 'invalid scan contract'; print('contract ok:', len(p['stocks']), 'stocks')"

      - name: Write scan_status.json
        # Always run after a successful scan (skip on scan failure). Internal
        # errors are caught and surfaced as warnings — the file is best-effort
        # metadata and the frontend gracefully degrades if it's missing.
        if: success()
        working-directory: backend
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import json, datetime, os, sys, traceback

          # Single source of truth for the schedule. MUST match `on.schedule`
          # above. Adding a new window requires editing only this list — both
          # `scheduled_cron` (JSON output) and the drift candidates are derived.
          WINDOWS = [(3, 30), (10, 30)]   # (hour_utc, minute_utc)

          try:
              event = os.environ["GH_EVENT_NAME"]
              scan = json.load(open("../frontend/public/data/latest_scan.json"))
              now = datetime.datetime.now(datetime.timezone.utc)
              triggered_at = now.isoformat()

              scheduled_window_utc = None
              drift_minutes = None
              if event == "schedule":
                  today = now.date()

                  def clock_minute_delta(a, b):
                      # Circular distance in minutes between two wall-clock HH:MM values.
                      a_m = a.hour * 60 + a.minute
                      b_m = b.hour * 60 + b.minute
                      return min(abs(a_m - b_m), 1440 - abs(a_m - b_m))

                  cands = []
                  for h, m in WINDOWS:
                      label = f"{h:02d}:{m:02d}"
                      cands.append((datetime.datetime.combine(today, datetime.time(h, m), tzinfo=datetime.timezone.utc), label))
                  # Only the LAST scheduled window of yesterday belongs in the
                  # candidates list. Yesterday's earlier window (e.g. 03:30
                  # when the schedule is [03:30, 10:30]) is too far back to
                  # plausibly be "the most recent past cron" and including
                  # it causes the clock-distance heuristic to misattribute
                  # scans in the 00:00 - last-window-of-WINDOWS UTC window.
                  last_h, last_m = WINDOWS[-1]
                  cands.append((
                      datetime.datetime.combine(today - datetime.timedelta(days=1), datetime.time(last_h, last_m), tzinfo=datetime.timezone.utc),
                      f"{last_h:02d}:{last_m:02d}",
                  ))
                  past = [(dt, label) for dt, label in cands if dt <= now]
                  if past:
                      # Pick the past scheduled window whose HH:MM is closest to
                      # now's wall-clock HH:MM. Handles on-time and small-drift
                      # cases correctly. For multi-hour cron delays (rare), the
                      # misattributed window is documented as a known limitation:
                      # GitHub Actions does not expose which cron expression fired.
                      chosen, scheduled_window_utc = min(
                          past, key=lambda p: clock_minute_delta(now, p[0]),
                      )
                      drift_minutes = int((now - chosen).total_seconds() // 60)

              scheduled_cron = ", ".join(f"{m} {h} * * 1-5" for h, m in WINDOWS)
              status = {
                  "generated_at": scan["generated_at"],
                  "triggered_at": triggered_at,
                  "commit_sha": os.environ["GH_SHA"],
                  "run_id": os.environ["GH_RUN_ID"],
                  "trigger": event,
                  "scheduled_window_utc": scheduled_window_utc,
                  "scheduled_cron": scheduled_cron,
                  "drift_minutes": drift_minutes,
              }
              with open("../frontend/public/data/scan_status.json", "w") as f:
                  json.dump(status, f, indent=2)
              print("scan_status.json:", status)
          except Exception as e:
              # Don't fail the workflow over a status-metadata write — the
              # scan itself succeeded and latest_scan.json is the load-bearing
              # artifact. Frontend gracefully degrades when scan_status.json
              # is absent or stale.
              print(f"::warning::scan_status.json write failed: {e}")
              traceback.print_exc()
              sys.exit(0)
          PY

      - name: Commit and push updated scan
        if: success()   # require scan step to succeed; Write scan_status.json is best-effort and won't block this
        run: |
          git config user.name "nse-swing-scanner-bot"
          git config user.email "actions@users.noreply.github.com"
          # Add whatever files exist. scan_status.json is best-effort; if it
          # wasn't written, `git add` skips that path with a non-fatal warning.
          git add frontend/public/data/latest_scan.json
          git add frontend/public/data/scan_status.json || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Scan update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger Netlify production deploy
        if: success()
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::warning::NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID not set; skipping Netlify deploy. Set them in repo settings to auto-deploy after each scan."
            exit 0
          fi
          npm install --no-save netlify-cli@latest
          npx netlify deploy --prod --dir=frontend/dist --auth="$NETLIFY_AUTH_TOKEN" --site="$NETLIFY_SITE_ID" --message="scan-$(date -u +'%Y-%m-%dT%H:%M:%SZ')"